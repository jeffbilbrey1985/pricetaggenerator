<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Price Tag Generator</title>
  <style>
    /* ── Screen styles ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #111;
      padding-bottom: 3rem;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.1rem 2rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: .03em; }
    header span { font-size: .8rem; opacity: .55; }

    .page-wrap {
      max-width: 1100px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    /* Input section */
    .scan-panel {
      background: #fff;
      border: 1px solid #dde1e9;
      border-radius: 10px;
      padding: 1.25rem 1.5rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .scan-panel h2 {
      font-size: .85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #6b7280;
      margin-bottom: 1rem;
    }
    .input-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: .6rem;
    }
    .upc-input {
      width: 100%;
      padding: .55rem .75rem;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: .85rem;
      color: #1f2937;
      background: #fafafa;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .upc-input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); background: #fff; }
    .upc-input.error { border-color: #ef4444; background: #fff5f5; }

    /* Action bar */
    .action-bar {
      display: flex;
      gap: .75rem;
      align-items: center;
      margin-top: 1.1rem;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .45rem;
      padding: .6rem 1.3rem;
      border-radius: 7px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background .15s, transform .1s, box-shadow .15s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: #1a1a2e;
      color: #fff;
      box-shadow: 0 2px 8px rgba(26,26,46,.3);
    }
    .btn-primary:hover { background: #2d2d50; }
    .btn-secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #d1d5db;
    }
    .btn-secondary:hover { background: #e5e7eb; }
    .tag-count {
      margin-left: auto;
      font-size: .82rem;
      color: #6b7280;
    }

    /* Preview area (screen) */
    .preview-label {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #9ca3af;
      margin-bottom: .75rem;
    }

    /* ── TAG styles shared screen+print ──────────────── */
    /* Tag dimensions match reference: 4" × 1.375" @96dpi ≈ 384 × 132px */
    .tag {
      width: 384px;
      height: 132px;
      border: 1px solid #111;
      background: #fff;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    .tag-inner {
      position: absolute;
      inset: 10px;
      display: grid;
      grid-template-columns: 1fr 42%;
      grid-template-rows: auto 1fr auto;
      column-gap: 6px;
    }

    .t-name {
      grid-column: 1 / 2;
      grid-row: 1 / 2;
      font-weight: 700;
      font-size: 13px;
      line-height: 1.15;
      color: #111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .t-desc {
      grid-column: 1 / 2;
      grid-row: 2 / 3;
      font-size: 11px;
      line-height: 1.2;
      color: #333;
      overflow: hidden;
    }
    .t-upc {
      grid-column: 1 / 2;
      grid-row: 3 / 4;
      font-size: 10px;
      color: #555;
    }
    .t-price-rail {
      grid-column: 2 / 3;
      grid-row: 1 / 4;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .price {
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }
    .price .p-dollar,
    .price .p-whole,
    .price .p-cents {
      font-weight: 800;
      font-size: 36px;
      line-height: 1;
    }

    /* Placeholder tag (screen only) */
    .tag-placeholder {
      width: 384px;
      height: 132px;
      border: 1px dashed #9ca3af;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tag-placeholder.error { border-color: #ef4444; background: #fff5f5; }
    .tag-placeholder .ph-inner { text-align: center; }
    .tag-placeholder .ph-title { font-size: 12px; font-weight: 600; color: #9ca3af; }
    .tag-placeholder.error .ph-title { color: #ef4444; }
    .tag-placeholder .ph-sub { font-size: 11px; color: #b0b8c8; margin-top: 2px; }

    /* Screen printable area */
    #printable {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
    }
    #printable .tag,
    #printable .tag-placeholder {
      margin: 8px;
      border-radius: 5px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    /* ── PRINT styles ─────────────────────────────────── */
    @media print {
      @page {
        size: letter portrait;
        margin: 0.35in 0.3in;
      }

      body, html { margin: 0; padding: 0; background: #fff; }

      header, .scan-panel, .action-bar, .preview-label, .tag-placeholder { display: none !important; }

      .page-wrap { margin: 0; padding: 0; max-width: none; }

      #printable {
        display: grid !important;
        grid-template-columns: 1fr 1fr;
        gap: 0;
        width: 100%;
      }

      .tag {
        /* Fill each grid cell; no fixed px so it scales to page */
        width: 100% !important;
        height: 1.375in !important;
        border: 1px solid #000 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        margin: 0 !important;
        page-break-inside: avoid;
        break-inside: avoid;
        overflow: hidden;
      }

      /* Ensure price font sizes are consistent on print */
      .price .p-dollar,
      .price .p-whole,
      .price .p-cents  { font-size: 26pt !important; }
      .t-name  { font-size: 10pt !important; }
      .t-desc  { font-size: 8.5pt !important; }
      .t-upc   { font-size: 7.5pt !important; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

const NUM_INPUTS = 28;
const digitsOnly = s => String(s||'').replace(/\D+/g, '');
const priceParts = str => {
  const m = String(str||'').match(/\$?(\d+)(?:\.(\d{2}))?/);
  return { whole: m ? m[1] : '0', cents: (m && m[2]) ? m[2] : '00' };
};

function buildDescription(rec) {
  // If the record already has a real name field, use it directly
  if (rec.name && rec.name.trim()) {
    return { name: rec.name.trim(), desc: (rec.description || '').trim() };
  }
  // Otherwise parse the single description field
  const full = (rec.description || '').trim();
  const parts = full.split(/\s*-\s*/);
  if (parts.length === 1) {
    return { name: full, desc: '' };
  }
  if (parts.length === 2) {
    return { name: parts[0].trim(), desc: parts[1].trim() };
  }
  // 3+ parts: combine brand + product as name, variant/device as desc
  const brand = parts[0].trim();
  const product = parts[1].trim();
  const variant = parts.slice(2).join(', ').trim();
  return { name: brand + ' ' + product, desc: variant };
}

function createTag(upc, rec) {
  const { whole, cents } = priceParts(rec.price);
  const { name, desc } = buildDescription(rec);
  const el = document.createElement('div');
  el.className = 'tag';
  el.innerHTML = `
    <div class="tag-inner">
      <div class="t-name">${name.replace(/</g,'&lt;')}</div>
      <div class="t-desc">${desc.replace(/</g,'&lt;')}</div>
      <div class="t-upc">UPC ${upc}</div>
      <div class="t-price-rail">
        <div class="price">
          <span class="p-dollar">$</span>
          <span class="p-whole">${whole}</span>
          <span class="p-cents">.${cents}</span>
        </div>
      </div>
    </div>`;
  return el;
}

function createPlaceholder(i, kind, raw) {
  const el = document.createElement('div');
  el.className = 'tag-placeholder' + (kind === 'error' ? ' error' : '');
  if (kind === 'error') {
    el.innerHTML = `<div class="ph-inner"><div class="ph-title">Not Found — Slot #${i}</div><div class="ph-sub">${raw || 'No Code'}</div></div>`;
  } else {
    el.innerHTML = `<div class="ph-inner"><div class="ph-title">Slot #${i}</div><div class="ph-sub">Scan or type UPC</div></div>`;
  }
  return el;
}

function render() {
  const printable = document.getElementById('printable');
  printable.innerHTML = '';
  let count = 0;

  document.querySelectorAll('.upc-input').forEach((inp, idx) => {
    const raw = inp.value.trim();
    const upc = digitsOnly(raw);
    inp.classList.remove('error');

    if (!upc) {
      printable.appendChild(createPlaceholder(idx + 1, 'empty', ''));
    } else if (productLibrary[upc]) {
      printable.appendChild(createTag(upc, productLibrary[upc]));
      count++;
      inp.classList.remove('error');
    } else {
      printable.appendChild(createPlaceholder(idx + 1, 'error', raw));
      inp.classList.add('error');
    }
  });

  document.getElementById('tag-count').textContent =
    count === 1 ? '1 tag ready' : `${count} tags ready`;
}

function initInputs() {
  const wrap = document.getElementById('input-container');
  for (let i = 1; i <= NUM_INPUTS; i++) {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.inputMode = 'numeric';
    inp.placeholder = `Slot #${i}`;
    inp.className = 'upc-input';
    inp.addEventListener('input', render);
    // Auto-advance to next slot on Enter or after 13 digits
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const inputs = [...document.querySelectorAll('.upc-input')];
        const next = inputs[inputs.indexOf(inp) + 1];
        if (next) next.focus();
      }
    });
    inp.addEventListener('input', () => {
      const upc = digitsOnly(inp.value);
      if (upc.length >= 12 && productLibrary[upc]) {
        render();
        const inputs = [...document.querySelectorAll('.upc-input')];
        const next = inputs[inputs.indexOf(inp) + 1];
        if (next) setTimeout(() => next.focus(), 50);
      }
    });
    wrap.appendChild(inp);
  }
}

function clearAll() {
  document.querySelectorAll('.upc-input').forEach(inp => {
    inp.value = '';
    inp.classList.remove('error');
  });
  render();
  document.querySelector('.upc-input').focus();
}

  const blob = new Blob([printDoc], { type: 'text/html' });

  const win = window.open(url, '_blank');

async function downloadPrintFile() {
  const tags = document.querySelectorAll('#printable .tag');
  if (!tags.length) {
    alert('No tags to print. Scan some UPC codes first.');
    return;
  }

  // Show loading state on button
  const btn = document.querySelector('[onclick="downloadPrintFile()"]');
  const originalHTML = btn.innerHTML;
  btn.innerHTML = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Generating...';
  btn.disabled = true;

  try {
    // Build a hidden off-screen div that mirrors the print layout
    // Letter page = 8.5in x 11in at 96dpi = 816 x 1056px
    // With 0.35in top/bottom and 0.3in left/right margins:
    // Usable area = (8.5 - 0.6)in wide = 7.9in = 758px
    // Tag height = 1.375in = 132px, 2 columns
    const SCALE = 2; // retina quality
    const PAGE_W_PX = 816;
    const PAGE_H_PX = 1056;
    const MARGIN_X = 29; // 0.3in * 96
    const MARGIN_Y = 34; // 0.35in * 96
    const USABLE_W = PAGE_W_PX - MARGIN_X * 2;
    const TAG_W = Math.floor(USABLE_W / 2);
    const TAG_H = 132; // 1.375in * 96

    // Create hidden render container
    const container = document.createElement('div');
    container.style.cssText = `
      position: fixed; left: -9999px; top: 0;
      width: ${USABLE_W}px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      background: white;
      font-family: 'Segoe UI', Arial, sans-serif;
    `;

    // Clone each tag, stripped of screen-only styles
    tags.forEach(tag => {
      const clone = tag.cloneNode(true);
      clone.style.cssText = `
        width: ${TAG_W}px !important;
        height: ${TAG_H}px !important;
        border: 1px solid #000 !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        margin: 0 !important;
        overflow: hidden;
        display: flex;
        align-items: stretch;
        background: white;
      `;
      // Fix tag-right border
      const right = clone.querySelector('.tag-right');
      if (right) right.style.borderLeft = '1px solid #000';

      // Fix font sizes for print equivalence
      const name = clone.querySelector('.t-name');
      const desc = clone.querySelector('.t-desc');
      const upc  = clone.querySelector('.t-upc');
      const priceEls = clone.querySelectorAll('.p-dollar, .p-whole, .p-cents');
      if (name) name.style.fontSize = '10pt';
      if (desc) desc.style.fontSize = '8.5pt';
      if (upc)  upc.style.fontSize  = '7.5pt';
      priceEls.forEach(el => {
        el.style.fontSize = '26pt';
        el.style.fontWeight = '800';
      });

      container.appendChild(clone);
    });

    document.body.appendChild(container);

    // Render to canvas
    const canvas = await html2canvas(container, {
      scale: SCALE,
      backgroundColor: '#ffffff',
      useCORS: true,
      logging: false
    });

    document.body.removeChild(container);

    // Build PDF - one or more letter pages
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'in', format: 'letter' });

    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const imgW = canvas.width;
    const imgH = canvas.height;

    // How many rows fit per page?
    const tagsPerRow = 2;
    const rowH_in = 1.375;
    const usableW_in = 8.5 - 0.6;  // 7.9in
    const marginX_in = 0.3;
    const marginY_in = 0.35;
    const pageH_in = 11 - marginY_in * 2; // 10.3in usable
    const rowsPerPage = Math.floor(pageH_in / rowH_in); // 7 rows = 14 tags per page

    const totalRows = Math.ceil(tags.length / tagsPerRow);
    const totalPages = Math.ceil(totalRows / rowsPerPage);

    // Scale factors: canvas px → inches
    const scaleX = usableW_in / (imgW / SCALE);
    const rowH_canvas = TAG_H * SCALE;

    for (let page = 0; page < totalPages; page++) {
      if (page > 0) pdf.addPage();

      const startRow = page * rowsPerPage;
      const endRow = Math.min(startRow + rowsPerPage, totalRows);
      const startY_px = startRow * rowH_canvas;
      const endY_px = endRow * rowH_canvas;
      const sliceH_px = endY_px - startY_px;

      // Slice the canvas for this page
      const pageCanvas = document.createElement('canvas');
      pageCanvas.width = imgW;
      pageCanvas.height = sliceH_px;
      const ctx = pageCanvas.getContext('2d');
      ctx.drawImage(canvas, 0, startY_px, imgW, sliceH_px, 0, 0, imgW, sliceH_px);

      const pageImg = pageCanvas.toDataURL('image/jpeg', 0.95);
      const sliceH_in = sliceH_px / SCALE * scaleX;

      pdf.addImage(pageImg, 'JPEG', marginX_in, marginY_in, usableW_in, sliceH_in);
    }

    pdf.save('price-tags.pdf');

  } catch (err) {
    alert('PDF generation failed: ' + err.message);
    console.error(err);
  } finally {
    btn.innerHTML = originalHTML;
    btn.disabled = false;
  }
}
